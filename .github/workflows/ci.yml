name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Backend tests (Python + PostgreSQL)
  # ------------------------------------------------------------------
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aegis_test
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite

      - name: Run tests with coverage (SQLite in-memory)
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          AEGIS_SECRET_KEY: ci-test-secret-key-not-for-production
          AEGIS_ENV: test
          USE_MEMORY_BUS: "true"
          OPENROUTER_API_KEY: ""
        run: |
          cd backend
          pip install pytest-cov
          pytest tests/ -v --tb=short -x --cov=app --cov-report=term --cov-report=xml:coverage.xml --cov-fail-under=50

      - name: Run tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql+asyncpg://aegis:testpass@localhost:5432/aegis_test
          AEGIS_SECRET_KEY: ci-test-secret-key-not-for-production
          AEGIS_ENV: test
          USE_MEMORY_BUS: "true"
          OPENROUTER_API_KEY: ""
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ------------------------------------------------------------------
  # Lint backend (optional but recommended)
  # ------------------------------------------------------------------
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: |
          cd backend
          ruff check app/ tests/ --select E,F,W --ignore E501
        continue-on-error: true  # Advisory, not blocking

  # ------------------------------------------------------------------
  # Frontend build
  # ------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit
        continue-on-error: true  # Report but don't block

      - name: Build
        run: |
          cd frontend
          npm run build

  # ------------------------------------------------------------------
  # Docker compose build
  # ------------------------------------------------------------------
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify compose config
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build --no-cache

  # ------------------------------------------------------------------
  # Security scan (Trivy)
  # ------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0  # Advisory, not blocking
          format: table
