# ============================================================
# AEGIS Autonomous Defense Platform
# Deploy: docker compose up -d
# Full stack (with Redis): docker compose --profile full up -d
# ============================================================
#
# ENVIRONMENT VARIABLES (set in .env or export):
#   POSTGRES_DB         - Database name (default: aegis)
#   POSTGRES_USER       - Database user (default: aegis)
#   POSTGRES_PASSWORD   - Database password (default: aegis_secret)
#   POSTGRES_PORT       - Host port for PostgreSQL (default: 5432)
#   REDIS_PORT          - Host port for Redis (default: 6379)
#   AEGIS_API_PORT     - Host port for API (default: 8000)
#   FRONTEND_PORT       - Host port for frontend (default: 3000)
#   NEXT_PUBLIC_API_URL - API URL for frontend (default: http://localhost:8000/api/v1)
#   NEXT_PUBLIC_WS_URL  - WebSocket URL for frontend (default: ws://localhost:8000/ws)
#   OLLAMA_BASE_URL     - Ollama inference endpoint (default: http://host.docker.internal:11434)
#   AEGIS_PLATFORM     - Platform hint (default: linux)
#   OPENROUTER_API_KEY  - OpenRouter API key (required for AI features)
#
# WINDOWS NOTES:
# - Docker Desktop for Windows required
# - host.docker.internal resolves to the Windows host
# - Network mode "host" is NOT supported on Docker Desktop for Windows
# - Line endings: ensure this file uses LF, not CRLF
# ============================================================

services:
  # --- PostgreSQL Database ---
  aegis-db:
    image: postgres:16-alpine
    container_name: aegis-db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    networks:
      - aegis-net

  # --- Redis (event bus, caching) ---
  aegis-redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 128
      --save 60 1000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 64M
    networks:
      - aegis-net

  # --- Backend API ---
  aegis-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegis-api
    ports:
      - "${AEGIS_API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-aegis_secret}@aegis-db:5432/${POSTGRES_DB:-aegis}
      - REDIS_URL=redis://aegis-redis:6379
      - AEGIS_PLATFORM=${AEGIS_PLATFORM:-linux}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    depends_on:
      aegis-db:
        condition: service_healthy
      aegis-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    networks:
      - aegis-net

  # --- Frontend Dashboard ---
  aegis-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
    container_name: aegis-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws}
      - NODE_ENV=production
    depends_on:
      aegis-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    networks:
      - aegis-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_data:
    driver: local
  backend_logs:
    driver: local

networks:
  aegis-net:
    driver: bridge
    name: aegis-net
